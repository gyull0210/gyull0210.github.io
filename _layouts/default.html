<!DOCTYPE html>
<html>
  <head>
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
      <title>{{ site.title }} - {{ page.title }}</title>
      <meta name="viewport" content="width=device-width">

      <!-- syntax highlighting CSS -->
      <link rel="stylesheet" href="/css/syntax.css">

      <!-- Custom CSS -->
      <link rel="stylesheet" href="/css/main.css">

      <!-- Responsive CSS -->
      <link rel="stylesheet" href="/css/responsive.css">

      <!-- Google Fonts -->
      <link href='https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700' rel='stylesheet' type='text/css'>
      <link href='https://fonts.googleapis.com/css?family=Raleway:300,400,700' rel='stylesheet' type='text/css'>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&family=Piazzolla:ital@0;1&display=swap" rel="stylesheet">

  </head>
  <body>
    <div class="site">
      <div class="sidebar" id="sidebar">
        <div class="header">
          <h1 class="title">Book and Bookshelf</h1>
          <span class="tagline">읽은 것들을 모아둡니다.</span>
        </div>
        <div class="author__avatar">
        <img class="profile" src="/images/poto.gif" alt="귤냥">
    </div>
        <div class="author__content">
      <h3 class="author__name" itemprop="name">귤냥</h3>
      <div class="author__bio" itemprop="description">
        <p>읽은 것과 공부한 것을 정리합니다. 가끔씩 글을 씁니다.</p>
      </div>
     </div>
        
<ul class="tt_category">
  <li class="">
    <a class="link_tit" href="/category">  분류 전체보기  
      <span class="c_cnt">(2)</span>
    </a>
    <ul class="category_list">
      <li class="">
        <a class="link_item" href="/category/html"> 일상  
          <span class="c_cnt">(0)</span>
        </a>
      </li>
      <li class="">
        <a class="link_item" href="/category/html">  공부한 것들  
          <span class="c_cnt">(0)</span>
        </a>
      </li>
      <li class="">
        <a class="link_item" href="/category/html"> 읽은 것들
          <span class="c_cnt">(0)</span>
        </a>
      </li>
      <li class="">
        <a class="link item" hrerf="/category/html"> 소설  
          <span class="c_cnt">(0)</span>
        </a>
      </li>
    </ul>
  </li>
 </ul>
        
        <div class="posts">
          <ul class="posts-list">
            {% for post in site.posts %}
              <li class="post-link">
                <a class="post-title" href="{{ post.url }}">
                  <span class="post-date">{{ post.date | date_to_string }}</span>
                  {{ post.title }}
                </a>
              </li>
            {% endfor %}
          </ul>
        </div>
        <div class="footer">
          <span id="footer-links">
            <a href="" class="footer-link">About</a> <span class="separator">&bull;</span>
            <a href="" class="footer-link">Twitter</a> <span class="separator">&bull;</span>
            <a href="" class="footer-link">GitHub</a>
          </span>
        </div>
      </div>

        {{ content }}

    </div>
    <script src="/scripts/responsive.js" type="text/javascript"></script>
  </body>
</html>
